<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanPick | Schedule Pickup</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        html { font-family: 'Inter', sans-serif; }
        
        /* --- Shared Aesthetics --- */
        body { 
            background: linear-gradient(-45deg, #064e3b, #111827, #065f46, #1f2937); 
            background-size: 400% 400%; 
            animation: gradient-bg 15s ease infinite; 
            color: #e5e7eb; 
            min-height: 100vh;
        }
        @keyframes gradient-bg { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        /* Glassmorphism Styles */
        .glass-base {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-panel { 
            background: rgba(31, 41, 55, 0.4); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Navigation */
        .menu-item { transition: all 0.2s ease; color: #9ca3af; font-weight: 500; display: block; }
        .menu-item:hover { background: rgba(52, 211, 153, 0.1); color: #34d399; }
        .menu-item.active { background: rgba(52, 211, 153, 0.15); color: #34d399; border-left: 3px solid #34d399; }

        /* Inputs */
        input, select, textarea { 
            background-color: rgba(17, 24, 39, 0.6); 
            border-color: #4b5563; 
            color: white; 
            color-scheme: dark;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: #34d399 !important; 
            box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.2) !important; 
            outline: none; 
        }
        
        /* Upload Box */
        .upload-box { border: 2px dashed #4b5563; transition: all 0.3s ease; }
        .upload-box:hover { border-color: #34d399; background-color: rgba(52, 211, 153, 0.05); }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="glass-base w-64 fixed md:static inset-y-0 left-0 z-30 flex flex-col transition-transform duration-300">
        <div class="h-20 flex items-center px-6 font-bold text-xl border-b border-gray-700">
            <i class="fas fa-trash text-emerald-400 mr-3"></i> CleanPick
        </div>

        <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
            <!-- Navigation Links pointing back to index.html -->
            <a href="index.html" class="menu-item px-4 py-3 rounded-lg"><i class="fas fa-home mr-3"></i>Dashboard</a>
            <a href="#" class="menu-item active px-4 py-3 rounded-lg"><i class="fas fa-calendar-plus mr-3"></i>Schedule</a>
            <a href="index.html" class="menu-item px-4 py-3 rounded-lg"><i class="fas fa-history mr-3"></i>History</a>
            <a href="index.html" class="menu-item px-4 py-3 rounded-lg"><i class="fas fa-bell mr-3"></i>Notifications</a>
            <a href="index.html" class="menu-item px-4 py-3 rounded-lg"><i class="fas fa-trophy mr-3"></i>Rewards</a>
            <a href="index.html" class="menu-item px-4 py-3 rounded-lg"><i class="fas fa-chart-line mr-3"></i>Analytics</a>
            <a href="index.html" class="menu-item px-4 py-3 rounded-lg"><i class="fas fa-cog mr-3"></i>Settings</a>
        </nav>

        <div class="p-4 border-t border-gray-700">
            <button id="logout-btn" class="w-full text-left px-4 py-3 rounded-lg hover:bg-red-600/20 text-red-400 transition-colors">
                <i class="fas fa-sign-out-alt mr-3"></i>Logout
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col h-full relative">
        
        <!-- Header -->
        <header class="h-20 glass-base border-b border-none flex items-center justify-between px-8 z-10 flex-shrink-0">
            <div>
                <h1 class="text-2xl font-bold text-white">Schedule Pickup</h1>
                <p class="text-sm text-gray-400">Fill in the details to request a service.</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <span id="user-display-name" class="block text-sm font-bold text-white">Loading...</span>
                    <span id="clock-time" class="text-xs text-emerald-400 font-mono">--:--</span>
                </div>
                <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-emerald-500 to-teal-500 p-[2px]">
                    <div class="h-full w-full rounded-full bg-gray-900 flex items-center justify-center text-white font-bold">
                        <span id="avatar-initial">U</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Form Area -->
        <main class="flex-1 overflow-y-auto p-8 scroll-smooth">
            <div class="max-w-3xl mx-auto glass-panel p-8 rounded-2xl border-t-4 border-emerald-500">
                
                <form id="schedule-form" class="space-y-6">
                    
                    <!-- Location -->
                    <div>
                        <h3 class="text-emerald-400 text-xs font-bold uppercase tracking-wider mb-4 border-l-2 border-emerald-500 pl-3">Location Details</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1.5">Full Address</label>
                                <div class="relative">
                                    <i class="fas fa-map-marker-alt absolute left-3 top-3.5 text-gray-500"></i>
                                    <input type="text" id="address" required placeholder="e.g. 123 Green Street, Apt 4B" class="w-full pl-10 py-3 rounded-lg border focus:ring-0 text-sm">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1.5">Waste Type</label>
                                <div class="relative">
                                    <i class="fas fa-recycle absolute left-3 top-3.5 text-gray-500"></i>
                                    <select id="wasteType" class="w-full pl-10 py-3 rounded-lg border focus:ring-0 appearance-none text-sm">
                                        <option>Mixed Household Waste</option>
                                        <option>Plastic (Recyclable)</option>
                                        <option>Metal / Cans</option>
                                        <option>E-Waste (Electronics)</option>
                                        <option>Organic / Compost</option>
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-3 top-3.5 text-gray-500 pointer-events-none text-xs"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Date & Time -->
                    <div>
                        <h3 class="text-emerald-400 text-xs font-bold uppercase tracking-wider mb-4 mt-8 border-l-2 border-emerald-500 pl-3">Date & Time</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1.5">Preferred Date</label>
                                <input type="date" id="date" required class="w-full px-3 py-3 rounded-lg border text-sm">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1.5">Time Slot</label>
                                <div class="relative">
                                    <select id="timeSlot" class="w-full px-3 py-3 rounded-lg border appearance-none text-sm">
                                        <option>Morning (8 AM - 12 PM)</option>
                                        <option>Afternoon (12 PM - 4 PM)</option>
                                        <option>Evening (4 PM - 8 PM)</option>
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-3 top-3.5 text-gray-500 pointer-events-none text-xs"></i>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1.5">Driver Notes (Optional)</label>
                            <textarea id="notes" rows="3" placeholder="e.g. Gate code is 1234, beware of dog." class="w-full px-3 py-3 rounded-lg border text-sm"></textarea>
                        </div>
                    </div>

                    <!-- Image Upload -->
                    <div class="upload-box rounded-xl p-6 text-center cursor-pointer group hover:bg-emerald-500/5 transition-colors">
                        <div class="w-12 h-12 bg-gray-700/50 rounded-full flex items-center justify-center mx-auto mb-3 text-gray-400 group-hover:text-emerald-400 group-hover:bg-emerald-500/20 transition-all">
                            <i class="fas fa-cloud-upload-alt text-xl"></i>
                        </div>
                        <p class="text-gray-300 font-medium text-sm">Click to upload waste image</p>
                        <p class="text-xs text-gray-500 mt-1">JPG, PNG up to 5MB (Optional)</p>
                    </div>

                    <!-- Buttons -->
                    <div class="flex gap-4 pt-4 border-t border-gray-700/50">
                        <a href="index.html" class="w-1/3 py-3 rounded-lg border border-gray-600 text-gray-400 hover:bg-gray-700 hover:text-white transition-colors text-sm font-bold text-center flex items-center justify-center">Cancel</a>
                        <button type="submit" id="submit-btn" class="w-2/3 py-3 rounded-lg bg-emerald-600 text-white font-bold hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-900/50 text-sm">Confirm Schedule</button>
                    </div>

                </form>
            </div>
        </main>
    </div>

    <!-- Logic -->
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDAhJnY13QBO2gRzRGVLdItKKZ3MG4aZNU",
            authDomain: "waste-management-proj-149e0.firebaseapp.com",
            projectId: "waste-management-proj-149e0",
            storageBucket: "waste-management-proj-149e0.firebasestorage.app",
            messagingSenderId: "458437538288",
            appId: "1:458437538288:web:1cf2005be98e44e124ad35",
            measurementId: "G-W9DFLL8150"
        };

        // Init App
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Helper to handle navigation errors safely
        function safeRedirect(url) {
            try {
                window.location.href = url;
            } catch (e) {
                console.error("Navigation failed:", e);
                // In some preview environments, location assignment fails.
                // We fallback to a message or a try with ./ prefix
                try {
                     window.location.assign('./' + url);
                } catch(e2) {
                     alert("Navigation is blocked in this environment. Please open " + url + " manually.");
                }
            }
        }

        // 1. Auth Check
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // Update UI Header
                const username = user.email.split('@')[0];
                document.getElementById('user-display-name').innerText = username;
                document.getElementById('avatar-initial').innerText = username.charAt(0).toUpperCase();
            } else {
                // Redirect if not logged in
                safeRedirect("index.html");
            }
        });

        // 2. Submit Handler
        const form = document.getElementById('schedule-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                alert("You must be logged in to schedule a pickup.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Scheduling...";

            try {
                // Add to Firestore
                await addDoc(collection(db, "pickups"), {
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    address: document.getElementById('address').value,
                    wasteType: document.getElementById('wasteType').value,
                    date: document.getElementById('date').value,
                    timeSlot: document.getElementById('timeSlot').value,
                    notes: document.getElementById('notes').value,
                    status: 'Pending',
                    createdAt: serverTimestamp()
                });

                alert("Pickup scheduled successfully!");
                safeRedirect("index.html"); // Go back to dashboard

            } catch (error) {
                console.error(error);
                alert("Error scheduling pickup: " + error.message);
                btn.disabled = false;
                btn.innerText = "Confirm Schedule";
            }
        });

        // 3. Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            if (confirm("Are you sure you want to logout?")) {
                signOut(auth).then(() => safeRedirect("index.html"));
            }
        });

        // 4. Clock
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('clock-time').innerText = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

    </script>
</body>
</html>
