<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Job | Verify OTP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .otp-input { letter-spacing: 0.5em; font-size: 2rem; text-align: center; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-blue-600 rounded-full blur-[100px] opacity-40"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-64 h-64 bg-green-600 rounded-full blur-[100px] opacity-40"></div>
    </div>

    <div id="loader" class="flex flex-col items-center">
        <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
        <p class="text-slate-400 text-sm tracking-wider animate-pulse">LOCATING ACTIVE JOB...</p>
    </div>

    <div id="no-job" class="hidden text-center max-w-md">
        <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-500 text-3xl">
            <i class="fas fa-check"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2">No Active Pickup</h2>
        <p class="text-slate-400 mb-8">You don't have any ongoing jobs right now.</p>
        <a href="driver.html" class="bg-white text-slate-900 px-8 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">
            Return to Dashboard
        </a>
    </div>

    <div id="active-job-card" class="hidden w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 fade-in shadow-2xl">
        
        <div class="flex justify-between items-start mb-6 border-b border-white/10 pb-6">
            <div>
                <span class="inline-block px-2 py-1 bg-green-500/20 text-green-400 text-[10px] font-bold rounded uppercase tracking-wider mb-2">● In Progress</span>
                <h1 class="text-3xl font-bold" id="job-type">Waste Pickup</h1>
                <p class="text-blue-200 text-sm mt-1" id="job-address">Locating address...</p>
            </div>
            <div class="text-right">
                <div class="text-2xl font-bold text-green-400" id="job-price">₹0</div>
                <div class="text-[10px] text-slate-400 uppercase">To Collect</div>
            </div>
        </div>

        <a id="maps-link" href="#" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold mb-8 shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
            <i class="fas fa-location-arrow"></i> Navigate to Location
        </a>

        <div class="bg-slate-900/50 rounded-2xl p-6 border border-white/10">
            <label class="block text-center text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">Ask Resident for OTP</label>
            
            <form onsubmit="app.verifyOtp(event)" class="space-y-4">
                <input type="tel" id="otp-input" maxlength="4" placeholder="----" class="otp-input w-full bg-transparent border-b-2 border-slate-600 focus:border-green-400 outline-none text-white placeholder-slate-700 transition-colors" autocomplete="off" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4)">
                
                <button type="submit" id="verify-btn" class="w-full bg-green-500 hover:bg-green-400 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-900/50 transition-all transform hover:-translate-y-1 mt-4">
                    Verify & Complete <i class="fas fa-check-circle ml-2"></i>
                </button>
            </form>
        </div>

        <div class="text-center mt-6">
            <p class="text-[10px] text-slate-500 font-mono">ID: <span id="job-id">...</span></p>
        </div>

    </div>

    <div id="success-overlay" class="fixed inset-0 bg-green-600 z-50 flex flex-col items-center justify-center hidden fade-in">
        <div class="bg-white rounded-full p-6 mb-6 animate-bounce">
            <i class="fas fa-check text-4xl text-green-600"></i>
        </div>
        <h2 class="text-4xl font-bold mb-2">Verified!</h2>
        <p class="text-green-100">Job Completed Successfully.</p>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.app = {};
        let currentJob = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                findActiveJob(user.uid);
            } else {
                window.location.href = 'auth.html';
            }
        });

        async function findActiveJob(uid) {
            const loader = document.getElementById('loader');
            const noJob = document.getElementById('no-job');
            const card = document.getElementById('active-job-card');

            // Find job where status is 'Assigned' and driver is current user
            const q = query(
                collection(db, "pickups"), 
                where("driverId", "==", uid), 
                where("status", "==", "Assigned")
            );

            const querySnapshot = await getDocs(q);

            loader.classList.add('hidden');

            if (!querySnapshot.empty) {
                // Get the first active job
                const docSnap = querySnapshot.docs[0];
                currentJob = { id: docSnap.id, ...docSnap.data() };
                renderJob(currentJob);
                card.classList.remove('hidden');
            } else {
                noJob.classList.remove('hidden');
            }
        }

        function renderJob(job) {
            document.getElementById('job-type').innerText = job.type + ' Pickup';
            document.getElementById('job-address').innerText = job.address;
            document.getElementById('job-price').innerText = '₹' + job.price;
            document.getElementById('job-id').innerText = job.id;
            
            // Setup Maps Link
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(job.address)}`;
            document.getElementById('maps-link').href = mapUrl;
        }

        window.app.verifyOtp = async (e) => {
            e.preventDefault();
            const input = document.getElementById('otp-input');
            const btn = document.getElementById('verify-btn');
            const enteredOtp = parseInt(input.value);

            if (!currentJob) return;

            // Validate Input
            if (isNaN(enteredOtp) || input.value.length !== 4) {
                alert("Please enter a valid 4-digit code.");
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            // CHECK OTP LOGIC
            if (enteredOtp === currentJob.otp) {
                try {
                    // Update DB
                    const jobRef = doc(db, "pickups", currentJob.id);
                    await updateDoc(jobRef, {
                        status: "Completed",
                        completedAt: new Date()
                    });

                    // Success Animation
                    document.getElementById('success-overlay').classList.remove('hidden');
                    document.getElementById('success-overlay').classList.add('flex');
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'driver.html';
                    }, 2000);

                } catch (error) {
                    console.error("Error updating job:", error);
                    alert("System error. Please try again.");
                    btn.innerHTML = 'Verify & Complete <i class="fas fa-check-circle ml-2"></i>';
                }
            } else {
                // Wrong OTP
                btn.innerHTML = 'Verify & Complete <i class="fas fa-check-circle ml-2"></i>';
                btn.classList.add('bg-red-500', 'hover:bg-red-600');
                btn.classList.remove('bg-green-500', 'hover:bg-green-400');
                setTimeout(() => {
                    btn.classList.remove('bg-red-500', 'hover:bg-red-600');
                    btn.classList.add('bg-green-500', 'hover:bg-green-400');
                }, 1000);
                input.value = '';
                input.focus();
                alert("Incorrect OTP. Ask resident again.");
            }
        };
    </script>
</body>
</html>
